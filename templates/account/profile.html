{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row gutters-sm">
      <div class="col-md-4 d-none d-md-block">
        <div class="card">
            <div class="card mb-4 mb-xl-0">
                <div class="card-header">Profile Information</div>
                <div class="card-body text-center">
                    <!-- Profile picture image-->
                    <img class="img-account-profile rounded-circle mb-2" src="{{ user.profile_image.url }}" alt="">
                    <div class="small font-italic text-muted mb-4">Username: {{ user }}</div>
                    <div class="small font-italic text-muted mb-2">Email: {{ user.email }}</div>
                </div>
            </div>
          <div class="card-body">
            <nav class="nav flex-column nav-pills nav-gap-y-1">
              <a href="#" data-toggle="tab" class="nav-item nav-link has-icon nav-link-faded">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-user mr-2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>Edit Profile
              </a>
              {% comment %} <a href="#" class="nav-item nav-link has-icon nav-link-faded"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-user mr-2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>Security</a> {% endcomment %}

            </nav>
          </div>
        </div>
      </div>
      <div class="col-md-8">
        <div class="card">
          <div class="card-body tab-content">
            <div class="tab-pane active" id="profile">
              <h6>EDIT PROFILE INFORMATION</h6>
              <hr>

              <div class="style-form">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}    
                    <div class="form-group">
                      <label for="bio">Username</label>
                      {{ form.username }}
                    </div>
                    <div class="form-group">
                      <label for="bio">Email</label>
                      {{ form.email }}
                    </div>
                    <div class="form-group">
                      <label for="bio">Profile Image</label>
                      {{ form.profile_image }}
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-primary">Edit Profile</button>
                    </div>       
                </form>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
